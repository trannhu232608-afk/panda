<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panda Master v9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .view-section { display: none; }
        .view-section.active { display: block !important; }
        .panda-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; font-size: 13px; }
        .branch-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .branch-btn { border: 1px solid #e2e8f0; padding: 10px; border-radius: 0.75rem; font-weight: 700; font-size: 10px; text-align: left; background: #fff; }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="loader" class="fixed inset-0 bg-white/90 z-50 flex items-center justify-center hidden flex-col">
        <div class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-40">
        <h1 class="font-black text-orange-600 uppercase tracking-tighter" onclick="location.reload()">PANDA NỘI BỘ</h1>
        <button onclick="toggleAdmin()" class="text-[10px] font-bold bg-slate-100 px-3 py-1 rounded-full border">ADMIN</button>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div id="view-search" class="view-section active text-center">
            <h2 class="text-3xl font-black my-10 uppercase italic text-slate-800">TRA CỨU NHÂN SỰ</h2>
            <form onsubmit="searchStaff(event)" class="space-y-4">
                <input type="tel" id="search-phone" placeholder="Nhập Số điện thoại..." class="w-full p-5 rounded-2xl border-2 text-center text-2xl font-black outline-none focus:border-orange-500">
                <button type="submit" class="w-full bg-orange-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">KIỂM TRA</button>
            </form>
        </div>

        <div id="view-details" class="view-section">
            <div class="panda-card p-5 border-2">
                <div class="text-center mb-6">
                    <h2 id="d-name" class="text-2xl font-black uppercase text-slate-800"></h2>
                    <p id="d-phone" class="text-orange-500 font-bold"></p>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl mb-6">
                    <div class="info-row"><span>Vị trí:</span><b id="d-pos"></b></div>
                    <div class="info-row"><span>MS VT/Thẻ:</span><b id="d-msvt"></b></div>
                    <div class="info-row"><span>Chi nhánh làm việc:</span><b id="d-dept"></b></div>
                </div>
                
                <div id="u-alert" class="hidden p-5 bg-red-100 text-red-600 rounded-xl mb-4 font-black text-center text-sm uppercase">SĐT này đã sử dụng hôm nay!</div>

                <div id="a-voucher">
                    <p class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">Bước 1: Chọn Voucher</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setV(40)" class="p-4 bg-orange-600 text-white rounded-xl font-black text-xs uppercase">40% Nhân sự</button>
                        <button onclick="setV(15)" class="p-4 bg-blue-600 text-white rounded-xl font-black text-xs uppercase">15% Gia đình</button>
                    </div>
                </div>

                <div id="a-branch" class="hidden mt-4">
                    <p class="text-[10px] font-black text-orange-600 mb-3 uppercase tracking-widest text-center">Bước 2: Chọn chi nhánh đang ăn</p>
                    <div class="branch-grid" id="branch-list"></div>
                </div>

                <div id="a-bill" class="hidden pt-6 border-t mt-6 text-center">
                    <p class="text-green-600 font-black text-sm mb-4 uppercase italic">Kích hoạt thành công!</p>
                    <input type="file" id="b-in" accept="image/*" capture="camera" class="hidden" onchange="upB(event)">
                    <button onclick="document.getElementById('b-in').click()" class="w-full py-8 border-4 border-dashed border-orange-200 rounded-2xl text-orange-400 font-black flex flex-col items-center gap-2">
                        <i class="fa-solid fa-camera text-3xl"></i>
                        <span class="text-[10px] uppercase">Chụp hóa đơn để hoàn tất</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="view-section space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="panda-card p-4 text-center"><p class="text-[9px] font-black text-slate-400">TỔNG NHÂN SỰ</p><p id="st-tot" class="text-2xl font-black">0</p></div>
                <div class="panda-card p-4 text-center"><p class="text-[9px] font-black text-orange-500">ĐÃ DÙNG HÔM NAY</p><p id="st-act" class="text-2xl font-black text-orange-500">0</p></div>
            </div>
            <div id="hist-list" class="panda-card divide-y overflow-hidden text-left"></div>
        </div>

        <div id="view-login" class="view-section py-10"><div class="panda-card p-8 border-2"><input type="password" id="pass" placeholder="Mật khẩu..." class="w-full p-4 border rounded-xl text-center font-black mb-4"><button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase">Đăng nhập</button></div></div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWoXTMHtl5tjRQTMeglj0HXkigkuzZdRTxwPs2HePTfzwW8OurmSD80qCwUs7l3FisPQ/exec";
        const BRANCHES = ["PVD Thủ Đức","PVH Q.12","ĐN Q.10","PVD Gò Vấp","Lê Trọng Tấn","Đường số 7","Nguyễn Thị Thập","Nguyễn Hữu Thọ","Hoà Bình","Bản Lẩu Q.10","Juju Bình Thạnh","Juju Gò Vấp","Juju Bình Tân","Hoàng Diệu DL","Trần Phú DL","Gà Đà Lạt","Trạm Đà Lạt","Vũng Tàu"];
        let emps = [], used = [], hist = [], cur = null, selV = "";

        async function loadData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
                const d = await res.json();
                emps = d.employees; used = d.usedToday || []; hist = d.history || [];
                document.getElementById('st-tot').innerText = emps.length;
                document.getElementById('st-act').innerText = d.activatedCount;
                document.getElementById('loader').classList.add('hidden');
            } catch (e) { location.reload(); }
        }

        window.searchStaff = (e) => {
            e.preventDefault();
            let p = document.getElementById('search-phone').value.replace(/\D/g,'');
            if(!p.startsWith('0')) p = '0' + p;
            cur = emps.find(x => x.phone === p);
            if(!cur) { alert("Số điện thoại này không có trong danh sách Panda!"); return; }
            
            document.getElementById('d-name').innerText = cur.name;
            document.getElementById('d-phone').innerText = cur.phone;
            document.getElementById('d-pos').innerText = cur.pos;
            document.getElementById('d-msvt').innerText = cur.msvt;
            document.getElementById('d-dept').innerText = cur.dept;

            const isU = used.includes(p);
            document.getElementById('a-voucher').classList.toggle('hidden', isU);
            document.getElementById('u-alert').classList.toggle('hidden', !isU);
            document.getElementById('a-branch').classList.add('hidden');
            document.getElementById('a-bill').classList.add('hidden');
            goToView('view-details');
        };

        window.setV = (v) => { 
            selV = v === 40 ? "Voucher 40% NS" : "Voucher 15% Gia đình";
            document.getElementById('a-voucher').classList.add('hidden');
            const bl = document.getElementById('branch-list');
            bl.innerHTML = BRANCHES.map(b => `<button onclick="triggerF('${b}')" class="branch-btn">${b}</button>`).join('');
            document.getElementById('a-branch').classList.remove('hidden');
        };

        window.triggerF = async (b) => {
            document.getElementById('loader').classList.remove('hidden');
            const res = await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({ name:cur.name, phone:cur.phone, type:selV, dept:cur.dept, branch:b })});
            if ((await res.text()).trim()==="Used") { alert("SĐT này đã dùng rồi!"); location.reload(); }
            else { document.getElementById('loader').classList.add('hidden'); document.getElementById('a-branch').classList.add('hidden'); document.getElementById('a-bill').classList.remove('hidden'); }
        };

        window.upB = (event) => {
            const r = new FileReader();
            r.onload = async (e) => {
                document.getElementById('loader').classList.remove('hidden');
                await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:"upload_bill", bill:e.target.result}) });
                alert("Hoàn tất! Panda đã ghi nhận lịch sử."); location.reload();
            }; r.readAsDataURL(event.target.files[0]);
        };

        window.login = () => { if(document.getElementById('pass').value === 'Nn@0410') { goToView('view-admin'); renderH(); } else alert("Sai!"); };
        window.toggleAdmin = () => { const act = document.querySelector('.view-section.active').id; if(act==='view-admin') goToView('view-search'); else goToView('view-login'); };
        function goToView(id) { document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function renderH() { document.getElementById('hist-list').innerHTML = hist.map(h => `<div class="p-3 flex justify-between text-[10px]"><div><b>${h.name}</b><p class="text-slate-400">${h.branchUsed}</p></div><div class="text-right text-orange-500"><b>${h.type}</b><p class="text-[8px] text-slate-300">${h.time}</p></div></div>`).join(''); }
        window.onload = loadData;
    </script>
</body>
</html>
